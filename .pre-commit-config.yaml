repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/RolandsRazma/pyright-python
    rev: 1.1.339
    hooks:
      - id: pyright
        args: [--pythonversion, "3.11"]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: [--skip, B101]
        exclude: ^tests/

ci:
  autofix_commit_msg: "chore: auto-format and lint fixes"
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: 'chore: pre-commit hook updates'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
